<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#5f6bdc,#8b5bbf);
padding:40px;
margin:0;
}

.header{
color:white;
margin-bottom:20px;
}

.header h1{
margin:0;
font-size:32px;
}

.header p{
margin:5px 0 0 0;
opacity:0.9;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.form-row{
display:flex;
gap:20px;
margin-bottom:15px;
}

.input-group{
flex:1;
}

label{
font-weight:bold;
display:block;
margin-bottom:5px;
}

input,select{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:10px;
background:#4b5bdc;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#3949ab;
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
}

th{
background:#f4f4f4;
}

table,th,td{
border:1px solid #ddd;
}

th,td{
padding:10px;
text-align:left;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>Student Registration System</h1>
<p>Powered by Google Sheets & Modern Technology</p>
</div>

<div class="card">

<h2>Register New Student</h2>

<div class="form-row">

<div class="input-group">
<label>Full Name</label>
<input id="name" placeholder="Enter student name">
</div>

<div class="input-group">
<label>Email</label>
<input id="email" placeholder="student@email.com">
</div>

</div>

<div class="form-row">

<div class="input-group">
<label>Course</label>
<select id="course">
<option>Select Course</option>
<option>Computer Science</option>
<option>Information Technology</option>
</select>
</div>

<div class="input-group">
<label>Phone Number</label>
<input id="phone" placeholder="01X-XXXXXXX">
</div>

</div>

<button onclick="registerStudent()">Register Student</button>

<p id="msg"></p>

<table id="table">

<tr>
<th>Name</th>
<th>Email</th>
<th>Course</th>
<th>Phone</th>
<th>Date</th>
</tr>

</table>

</div>

</div>

<script>

var url="https://script.google.com/macros/s/AKfycbyDxyVG8YT-eAsy3Vi6nj0ACmIzXtjl65e-quJJYKNmPceaylXbTlMFTQTz4eiod-ZOiA/exec";

function registerStudent(){

var data={
name:document.getElementById("name").value,
email:document.getElementById("email").value,
course:document.getElementById("course").value,
phone:document.getElementById("phone").value
};

fetch(url,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.json())
.then(res=>{
document.getElementById("msg").innerHTML="Student Registered!";
loadData();
});

}

function loadData(){

fetch(url)
.then(res=>res.json())
.then(data=>{

var table=document.getElementById("table");

for(var i=1;i<data.length;i++){

var row=table.insertRow();

for(var j=0;j<data[i].length;j++){

var cell=row.insertCell();
cell.innerHTML=data[i][j];

}

}

});

}

loadData();

</script>

</body>
</html>
