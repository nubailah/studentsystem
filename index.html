<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#5b6be1,#8c5cc3);
margin:0;
padding:40px;
color:#333;
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(90deg,#6a5af9,#4a7de8);
color:white;
padding:20px 30px;
border-radius:15px;
}

.header h1{
margin:0;
font-size:28px;
}

.header p{
margin:5px 0 0 0;
font-size:14px;
opacity:0.9;
}

.back-btn{
background:rgba(255,255,255,0.2);
border:none;
padding:10px 18px;
border-radius:10px;
color:white;
cursor:pointer;
}

/* container */

.container{
max-width:1000px;
margin:auto;
margin-top:20px;
}

/* live data alert */

.alert{
background:#e6f4ea;
border-left:6px solid #34a853;
padding:12px;
border-radius:8px;
margin-bottom:20px;
}

/* cards */

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
margin-bottom:25px;
}

.card h3{
margin-top:0;
color:#4a5bdc;
}

/* form */

.form-row{
display:flex;
gap:20px;
margin-bottom:15px;
}

.form-group{
flex:1;
}

label{
display:block;
font-weight:bold;
margin-bottom:5px;
}

input,select{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

/* button */

.register-btn{
background:#4a5bdc;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

/* table */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#f3f4f7;
font-size:13px;
}

table,th,td{
border:1px solid #e1e1e1;
}

th,td{
padding:10px;
text-align:left;
}

.footer-info{
font-size:12px;
margin-top:10px;
color:#666;
}

</style>

</head>

<body>

<div class="header">
<div>
<h1>Student Registration System</h1>
<p>⚡ Powered by Google Sheets & Modern Technology</p>
</div>

<button class="back-btn">← Back to Dashboard</button>
</div>

<div class="container">

<div class="alert">
✔ <b>Live Data</b> - Successfully loaded from your Google Sheets!
</div>

<div class="card">

<h3>🧍 Register New Student</h3>

<div class="form-row">

<div class="form-group">
<label>Full Name</label>
<input id="name" placeholder="Enter student name">
</div>

<div class="form-group">
<label>Email</label>
<input id="email" placeholder="student@email.com">
</div>

</div>

<div class="form-row">

<div class="form-group">
<label>Course</label>
<select id="course">
<option>Select Course</option>
<option>Computer Science</option>
<option>Information Technology</option>
</select>
</div>

<div class="form-group">
<label>Phone Number</label>
<input id="phone" placeholder="01X-XXXXXXX">
</div>

</div>

<button class="register-btn" onclick="registerStudent()">✔ Register Student</button>

<p id="msg"></p>

</div>

<div class="card">

<h3>🧍 Student Registration</h3>
<p style="color:#666;font-size:13px;">📊 Your actual data from Google Sheets</p>

<table id="table">

<tr>
<th>NO</th>
<th>STUDENT NAME</th>
<th>EMAIL</th>
<th>COURSE</th>
<th>PHONE</th>
<th>DATE</th>
</tr>

</table>

<div class="footer-info">
📈 Data source: Google Sheets
</div>

</div>

</div>

<script>

var url="https://script.google.com/macros/s/AKfycbyDxyVG8YT-eAsy3Vi6nj0ACmIzXtjl65e-quJJYKNmPceaylXbTlMFTQTz4eiod-ZOiA/exec";

function registerStudent(){

var data={
name:document.getElementById("name").value,
email:document.getElementById("email").value,
course:document.getElementById("course").value,
phone:document.getElementById("phone").value
};

fetch(url,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.json())
.then(res=>{
document.getElementById("msg").innerHTML="Student Registered!";
loadData();
});

}

function loadData(){

fetch(url)
.then(res=>res.json())
.then(data=>{

var table=document.getElementById("table");

for(var i=1;i<data.length;i++){

var row=table.insertRow();

row.insertCell(0).innerHTML=i;

for(var j=0;j<data[i].length;j++){

var cell=row.insertCell(j+1);
cell.innerHTML=data[i][j];

}

}

});

}

loadData();

</script>

</body>
</html>
